<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>畢業帽畫圖 App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: sans-serif; }
        #canvasWrap { position: relative; display: inline-block; }
        #hatLayer, #drawLayer { position: absolute; left: 0; top: 0; }
        #hatLayer { z-index: 0; }
        #drawLayer { z-index: 1; }
        canvas { border: 2px solid #333; }
    </style>
</head>
<body>
    <h2>畢業帽設計 App</h2>
    <button id="brushBtn">畫筆</button>
    <button id="eraserBtn">橡皮擦</button>
    <input type="color" id="colorPicker" value="#ff0000">
    <input type="number" id="widthPicker" min="1" max="50" value="10">
    <button id="saveBtn">下載</button><br>
    <div id="canvasWrap">
        <canvas id="hatLayer" width="400" height="400"></canvas>
        <canvas id="drawLayer" width="400" height="400"></canvas>
    </div>
    <br>
    <small>橡皮擦只擦畫上去的內容，不會擦掉帽子</small>
    <script src="script.js"></script>
</body>
</html>
